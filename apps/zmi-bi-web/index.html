<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ZMI 蔵王温泉 市場BI</title>
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <div class="eyebrow">Zao Market Intelligence</div>
        <h1>ZMI 蔵王温泉 市場BI</h1>
        <div class="badges" aria-label="データ仕様">
          <span class="badge badge-blue">全ソース統合</span>
          <span class="badge" id="sourcesBadge">Booking / Jalan / Rakuten</span>
          <span class="badge" id="periodPolicyBadge">当期間 + 過去3期</span>
        </div>
      </div>
      <div class="hero-actions">
        <div class="meta-box"><span>最終データ取得</span><strong id="lastCollected">—</strong></div>
        <div class="meta-box"><span>画面更新</span><strong id="renderedAt">—</strong></div>
        <button type="button" class="btn btn-primary" id="refreshBtn">最新データを再読込</button>
      </div>
    </header>

    <section class="notice" role="note">
      この画面は、OTA上に表示されている価格と販売状況を見た市場ボードです。PMS実在庫・実稼働率ではありません。「市場の詰まり具合」は、OTA上で販売不可と見えた宿の割合を参考にしています。
    </section>

    <section class="controls" aria-label="表示条件">
      <label class="control">月×期間
        <select id="periodSelect"></select>
        <small>当期間を自動選択。過去は3期分まで保持。</small>
      </label>
      <label class="control">施設グループ
        <select id="groupSelect">
          <option value="all">全施設</option>
          <option value="own">自社（三浦屋/喜らく）</option>
          <option value="room_comp">重点競合</option>
          <option value="anchor">高級・アンカー</option>
          <option value="mid">中価格帯</option>
          <option value="budget">小規模・素泊まり</option>
        </select>
      </label>
      <label class="control">信頼度
        <select id="confSelect">
          <option value="all">すべて</option>
          <option value="high">高のみ</option>
          <option value="medium_or_high">中以上</option>
          <option value="low">低のみ</option>
        </select>
        <small>高: 価格判断に使いやすい／中: 参考にできる／低: 注意して見る</small>
      </label>
      <label class="control">施設検索
        <input id="searchInput" type="search" inputmode="search" placeholder="例: 喜らく / OAKHILL" />
      </label>
      <div class="control action-control" aria-label="操作">
        <button type="button" class="btn btn-ghost" id="resetBtn">条件リセット</button>
        <button type="button" class="btn btn-secondary" id="exportVisibleBtn">表示中CSV</button>
        <button type="button" class="btn btn-secondary" id="copyStateBtn">URLコピー</button>
      </div>
    </section>

    <nav class="tabs" aria-label="BI sections">
      <button type="button" class="tab active" data-tab="overview">市場サマリー</button>
      <button type="button" class="tab" data-tab="facilities">宿ごとの状況</button>
      <button type="button" class="tab" data-tab="competitors">重点競合</button>
      <button type="button" class="tab" data-tab="daily">日別カレンダー</button>
      <button type="button" class="tab" data-tab="data">データの見方</button>
    </nav>

    <div id="errorBanner" class="error-banner" hidden></div>
    <main id="main" class="main"></main>
    <footer class="footer" id="footer">ZMI市場BI：Booking / Jalan / Rakuten の観測データを統合。価格・販売状況はOTA表示ベースです。</footer>
  </div>
  <div id="toast" class="toast" hidden></div>
  <script src="assets/app.js"></script>
</body>
</html>
